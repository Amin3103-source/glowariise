name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npx electron-builder --win --x64
      - uses: actions/upload-artifact@v3
        with:
          name: GlowArise-Windows
          path: dist/*.exe
